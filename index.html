<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звичайні Жорданові виключення</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <header>
            <h1>Звичайні Жорданові виключення (ЗВЖ)</h1>
            <p>Інструмент для обчислення оберненої матриці, рангу та розв'язання СЛАР</p>
        </header>

        <main>
            <div class="input-grid">
                <div class="input-group">
                    <label for="matrixA">Матриця A</label>
                    <textarea id="matrixA" placeholder="Введіть матрицю (числа через пробіл)">1 2 1
-1 1 3
2 5 -2</textarea>
                </div>

                <div class="input-group">
                    <label for="matrixB">Вектор B (для СЛАР)</label>
                    <textarea id="matrixB" placeholder="Введіть вектор">2
5
1</textarea>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="calcInverse()">Обернена матриця</button>
                <button class="btn btn-secondary" onclick="calcRank()">Ранг матриці</button>
                <button class="btn btn-accent" onclick="calcSolve()">Розв'язати СЛАР</button>
            </div>

            <div class="output-section">
                <h3>Результати та протокол</h3>
                <pre id="output">Тут з'явиться результат обчислень...</pre>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
